<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <title>Chingu — Cappy wordmark lockup</title>
  <defs>
    <linearGradient id="wmWarm" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE4C4"/>
      <stop offset="55%" stop-color="#FFB07A"/>
      <stop offset="100%" stop-color="#C8956D"/>
    </linearGradient>
    <linearGradient id="wmIndigo" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="wmFrame">
      <rect x="20" y="20" width="160" height="160" rx="38"/>
    </clipPath>
  </defs>

  <!-- Mini Cappy badge -->
  <rect x="20" y="20" width="160" height="160" rx="38" fill="url(#wmWarm)"/>
  <g clip-path="url(#wmFrame)">
    <ellipse cx="100" cy="125" rx="68" ry="62" fill="#C8956D"/>
    <ellipse cx="58" cy="73" rx="13" ry="11" transform="rotate(-22 58 73)" fill="#A6754F"/>
    <ellipse cx="142" cy="73" rx="13" ry="11" transform="rotate(22 142 73)" fill="#A6754F"/>
    <ellipse cx="59" cy="75" rx="6.5" ry="5" transform="rotate(-22 59 75)" fill="#FFD4A8"/>
    <ellipse cx="141" cy="75" rx="6.5" ry="5" transform="rotate(22 141 75)" fill="#FFD4A8"/>
    <ellipse cx="56" cy="126" rx="12" ry="7" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="144" cy="126" rx="12" ry="7" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="100" cy="146" rx="42" ry="28" fill="#E8B98E"/>
    <circle cx="79" cy="106" r="8" fill="#0F172A"/>
    <circle cx="121" cy="106" r="8" fill="#0F172A"/>
    <circle cx="82" cy="103" r="2.5" fill="#FFFFFF"/>
    <circle cx="124" cy="103" r="2.5" fill="#FFFFFF"/>
    <ellipse cx="100" cy="135" rx="8" ry="4.5" fill="#0F172A"/>
    <path d="M89 149 Q 100 158 111 149" stroke="#0F172A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Tiny indigo record badge on Cappy's badge -->
  <circle cx="158" cy="42" r="14" fill="url(#wmIndigo)"/>
  <circle cx="158" cy="42" r="5" fill="#EF4444"/>

  <!-- Wordmark "chingu" -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#0F172A">
    <text x="210" y="120" font-size="92" font-weight="800" letter-spacing="-3.5">chingu</text>
    <text x="212" y="160" font-size="22" font-weight="500" letter-spacing="0.4" fill="#6366F1">친구 · your SOP friend</text>
  </g>
</svg>
