<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <title>Autopilot running — Cappy with director's slate</title>
  <defs>
    <linearGradient id="ap-bg" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#FFF5E4"/>
    </linearGradient>
    <linearGradient id="slate-grad" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="22" fill="url(#ap-bg)"/>

  <!-- Motion lines (suggesting speed / running) -->
  <g stroke="#A78BFA" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="40"  y1="120" x2="78"  y2="120"/>
    <line x1="30"  y1="160" x2="70"  y2="160"/>
    <line x1="50"  y1="200" x2="80"  y2="200"/>
    <line x1="35"  y1="240" x2="60"  y2="240"/>
  </g>

  <!-- Cappy (focused) -->
  <g transform="translate(140, 90)">
    <ellipse cx="90" cy="110" rx="92" ry="80" fill="#C8956D"/>
    <ellipse cx="32" cy="48" rx="15" ry="12" transform="rotate(-22 32 48)" fill="#A6754F"/>
    <ellipse cx="148" cy="48" rx="15" ry="12" transform="rotate(22 148 48)" fill="#A6754F"/>
    <ellipse cx="33" cy="50" rx="7" ry="5" transform="rotate(-22 33 50)" fill="#FFD4A8"/>
    <ellipse cx="147" cy="50" rx="7" ry="5" transform="rotate(22 147 50)" fill="#FFD4A8"/>
    <ellipse cx="22" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="158" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="90" cy="135" rx="48" ry="30" fill="#E8B98E"/>
    <!-- Working eyes -->
    <path d="M58 92 Q 68 100 78 92" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M102 92 Q 112 100 122 92" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="90" cy="125" rx="9" ry="5" fill="#0F172A"/>
    <line x1="83" y1="146" x2="97" y2="146" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Director's slate prop -->
  <g transform="translate(310, 220) rotate(-8)">
    <!-- Bottom board -->
    <rect x="0" y="20" width="120" height="74" rx="6" fill="#1E1B4B"/>
    <!-- Top clapper -->
    <rect x="0" y="0" width="120" height="28" rx="4" fill="url(#slate-grad)"/>
    <!-- Stripes on clapper -->
    <polygon points="14,0 30,0 22,28 6,28" fill="#FFFFFF"/>
    <polygon points="46,0 62,0 54,28 38,28" fill="#FFFFFF"/>
    <polygon points="78,0 94,0 86,28 70,28" fill="#FFFFFF"/>
    <polygon points="110,0 126,0 118,28 102,28" fill="#FFFFFF"/>
    <!-- Text on board -->
    <text x="12" y="48" font-family="Inter, sans-serif" font-weight="600" font-size="9" fill="#A78BFA" letter-spacing="0.08em">SCENE</text>
    <text x="12" y="64" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF">step_03</text>
    <text x="12" y="84" font-family="Inter, sans-serif" font-weight="500" font-size="9" fill="#A78BFA" letter-spacing="0.08em">AUTOPILOT</text>
  </g>

  <text x="240" y="335" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="16" fill="#7C3AED" letter-spacing="-0.01em">Autopilot running — Cappy's got it.</text>
</svg>
