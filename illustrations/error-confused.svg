<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <title>Error — Cappy is confused (no blame, just a question mark)</title>
  <defs>
    <linearGradient id="err-bg" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5E4"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="22" fill="url(#err-bg)"/>

  <!-- Cappy, head slightly tilted -->
  <g transform="translate(120, 90) rotate(-6 90 110)">
    <ellipse cx="90" cy="110" rx="92" ry="80" fill="#C8956D"/>
    <ellipse cx="32" cy="48" rx="15" ry="12" transform="rotate(-22 32 48)" fill="#A6754F"/>
    <ellipse cx="148" cy="48" rx="15" ry="12" transform="rotate(22 148 48)" fill="#A6754F"/>
    <ellipse cx="33" cy="50" rx="7" ry="5" transform="rotate(-22 33 50)" fill="#FFD4A8"/>
    <ellipse cx="147" cy="50" rx="7" ry="5" transform="rotate(22 147 50)" fill="#FFD4A8"/>
    <ellipse cx="22" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="158" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="90" cy="135" rx="48" ry="30" fill="#E8B98E"/>
    <!-- Mismatched eyes — confused, not sad -->
    <circle cx="68" cy="92" r="9" fill="#0F172A"/>
    <circle cx="71" cy="89" r="2.5" fill="#FFFFFF"/>
    <circle cx="112" cy="92" r="11" fill="none" stroke="#0F172A" stroke-width="3"/>
    <ellipse cx="90" cy="125" rx="9" ry="5" fill="#0F172A"/>
    <!-- Small "o" mouth -->
    <ellipse cx="90" cy="148" rx="5" ry="6" fill="none" stroke="#0F172A" stroke-width="3"/>
  </g>

  <!-- Speech bubble with question mark -->
  <g transform="translate(320, 70)">
    <path d="M 0 32 Q 0 0 32 0 L 96 0 Q 128 0 128 32 L 128 76 Q 128 108 96 108 L 56 108 L 32 132 L 40 108 L 32 108 Q 0 108 0 76 Z"
          fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="64" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="64" fill="#F59E0B" letter-spacing="-0.02em">?</text>
  </g>

  <!-- Tiny dots showing thinking -->
  <circle cx="290" cy="190" r="3" fill="#94A3B8"/>
  <circle cx="305" cy="200" r="2.5" fill="#94A3B8" opacity="0.7"/>
  <circle cx="318" cy="206" r="2" fill="#94A3B8" opacity="0.5"/>

  <text x="240" y="335" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#334155" letter-spacing="-0.01em">Hmm — let's try that again.</text>
</svg>
