<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <title>Recording active — Cappy with clipboard</title>
  <defs>
    <linearGradient id="rec-bg" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5E4"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
    <radialGradient id="rec-pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="360" rx="22" fill="url(#rec-bg)"/>

  <!-- Indigo focus rings (suggest recording) -->
  <circle cx="240" cy="180" r="160" fill="url(#rec-pulse)"/>
  <circle cx="240" cy="180" r="120" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.35" fill="none" stroke-dasharray="4 6"/>

  <!-- Cappy -->
  <g transform="translate(150, 80)">
    <ellipse cx="90" cy="110" rx="92" ry="80" fill="#C8956D"/>
    <ellipse cx="32" cy="48" rx="15" ry="12" transform="rotate(-22 32 48)" fill="#A6754F"/>
    <ellipse cx="148" cy="48" rx="15" ry="12" transform="rotate(22 148 48)" fill="#A6754F"/>
    <ellipse cx="33" cy="50" rx="7" ry="5" transform="rotate(-22 33 50)" fill="#FFD4A8"/>
    <ellipse cx="147" cy="50" rx="7" ry="5" transform="rotate(22 147 50)" fill="#FFD4A8"/>
    <ellipse cx="22" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="158" cy="112" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
    <ellipse cx="90" cy="135" rx="48" ry="30" fill="#E8B98E"/>
    <!-- Working eyes — slightly squinted, focused -->
    <path d="M58 92 Q 68 100 78 92" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M102 92 Q 112 100 122 92" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="90" cy="125" rx="9" ry="5" fill="#0F172A"/>
    <!-- Small focused mouth -->
    <line x1="83" y1="146" x2="97" y2="146" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Clipboard prop -->
  <g transform="translate(330, 230) rotate(-8)">
    <rect x="0" y="0" width="84" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="28" y="-6" width="28" height="14" rx="4" fill="#94A3B8"/>
    <line x1="14" y1="28" x2="68" y2="28" stroke="#CBD5E1" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="14" y1="44" x2="60" y2="44" stroke="#CBD5E1" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="14" y1="60" x2="68" y2="60" stroke="#CBD5E1" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="14" y1="76" x2="50" y2="76" stroke="#CBD5E1" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Recording dot (top right) -->
  <g transform="translate(420, 40)">
    <circle r="14" fill="#FFFFFF" stroke="#FECACA" stroke-width="2"/>
    <circle r="7" fill="#EF4444"/>
  </g>

  <text x="240" y="335" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#6366F1" letter-spacing="0.06em">REC · CAPPY IS ON IT</text>
</svg>
