<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chingu — My Guides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter+Tight:wght@400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter Tight', -apple-system, sans-serif;
      background: #FAFAF7;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .ko { font-family: 'Gowun Dodum', sans-serif; }

    /* ── Top bar ── */
    .top-bar {
      background: white;
      border-bottom: 1px solid #E2E8F0;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.92);
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 11px;
      background: linear-gradient(135deg, #FFE4C4, #FFB07A, #C8956D);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      box-shadow: 0 4px 14px rgba(255, 176, 122, 0.3);
    }
    .logo-mark svg { width: 26px; height: 26px; }
    .logo-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 19px; font-weight: 700; color: #0F172A; letter-spacing: -0.03em;
    }
    .logo-sub  {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 13px; color: #C8956D; margin-left: 4px;
    }
    .page-title {
      font-size: 14px; font-weight: 600; color: #64748B;
      margin-left: 16px; padding-left: 16px; border-left: 1px solid #E2E8F0;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.01em;
    }

    .btn {
      padding: 9px 20px; border: none; border-radius: 999px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.15s ease; letter-spacing: -0.01em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FFB07A, #E8A87C);
      color: #1A0A04;
      box-shadow: 0 4px 14px rgba(255, 176, 122, 0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 8px 22px rgba(255, 176, 122, 0.5);
      transform: translateY(-1px);
      background: linear-gradient(135deg, #FFC494, #E8B98E);
    }
    .btn-ghost { background: white; color: #334155; border: 1.5px solid #E2E8F0; }
    .btn-ghost:hover { background: #FFF8F0; border-color: #FFB07A; color: #C8956D; }

    /* ── Main ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 36px 24px 80px; }

    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-head h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
    }
    .doc-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #C8956D; font-weight: 600;
      background: #FFF5E4; padding: 5px 11px; border-radius: 9999px; margin-left: 12px;
      letter-spacing: 0.04em;
    }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }

    .card {
      background: white; border-radius: 18px; overflow: hidden;
      box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 4px 16px rgba(15,23,42,0.04);
      transition: all 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
      border: 1px solid #F1F5F9;
      display: flex; flex-direction: column;
    }
    .card:hover {
      box-shadow: 0 12px 32px rgba(255, 176, 122, 0.15), 0 4px 14px rgba(15,23,42,0.06);
      transform: translateY(-4px);
      border-color: #FFE4C4;
    }

    .card-thumb {
      aspect-ratio: 16/9; background: #F1F5F9; overflow: hidden;
      position: relative; flex-shrink: 0;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .card-thumb-empty {
      width: 100%; height: 100%; display: flex; align-items: center;
      justify-content: center; background: linear-gradient(135deg, #FFF5E4, #FFE4C4);
    }
    .card-thumb-empty svg { width: 60px; height: 60px; opacity: 0.5; }

    .step-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(15,23,42,0.7); color: white;
      font-size: 11px; font-weight: 600; padding: 3px 8px;
      border-radius: 999px; backdrop-filter: blur(4px);
    }

    .card-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px; font-weight: 700; color: #0F172A;
      letter-spacing: -0.02em; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta { font-size: 12px; color: #94A3B8; font-weight: 500; }

    .card-actions { display: flex; gap: 8px; margin-top: auto; }
    .card-actions .btn { flex: 1; padding: 8px 12px; font-size: 12px; }
    .btn-delete { background: white; color: #EF4444; border: 1.5px solid #FECACA; }
    .btn-delete:hover { background: #FEF2F2; }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 100px 24px; color: #94A3B8;
    }
    .empty img { width: 220px; opacity: 0.95; margin-bottom: 20px; }
    .empty h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px; font-weight: 700; color: #334155; margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .empty p { font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
    .empty .ko { color: #C8956D; font-size: 13px; margin-bottom: 28px; display: block; }

    /* ── Confirm overlay ── */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);
      z-index: 50; align-items: center; justify-content: center;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: white; border-radius: 16px; padding: 28px;
      max-width: 360px; width: 90%;
      box-shadow: 0 20px 60px rgba(15,23,42,0.18);
    }
    .confirm-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: #64748B; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center">
    <a class="logo" href="#">
      <div class="logo-mark">
        <svg viewBox="0 0 200 200">
          <ellipse cx="100" cy="112" rx="86" ry="76" fill="#C8956D"/>
          <ellipse cx="38" cy="50" rx="14" ry="11" transform="rotate(-22 38 50)" fill="#A67050"/>
          <ellipse cx="162" cy="50" rx="14" ry="11" transform="rotate(20 162 50)" fill="#A67050"/>
          <ellipse cx="100" cy="134" rx="46" ry="28" fill="#E8B98E"/>
          <circle cx="74" cy="90" r="11" fill="#0F172A"/><circle cx="78" cy="85" r="3.5" fill="white"/>
          <circle cx="126" cy="90" r="11" fill="#0F172A"/><circle cx="130" cy="85" r="3.5" fill="white"/>
          <ellipse cx="100" cy="124" rx="9" ry="5" fill="#0F172A"/>
          <path d="M85 142 Q100 154 115 142" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-name">chingu</span>
      <span class="logo-sub">친구</span>
    </a>
    <span class="page-title">My Guides</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost" id="btnImport">⬆ Import</button>
    <input type="file" id="importInput" accept=".json" style="display:none">
    <button class="btn btn-ghost" id="btnExportAll">⬇ Export All</button>
    <button class="btn btn-primary" id="btnNewRecording">+ New Recording</button>
  </div>
</div>

<div class="main">
  <div class="section-head">
    <div style="display:flex;align-items:center">
      <h2>All Guides</h2>
      <span class="doc-count" id="docCount">0</span>
    </div>
    <input type="search" id="searchInput" placeholder="Search guides…"
      style="padding:8px 14px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;font-family:inherit;width:220px;outline:none;transition:border-color 0.15s"
      onfocus="this.style.borderColor='#6366F1'" onblur="this.style.borderColor='#E2E8F0'">
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty hidden" id="emptyState">
    <img src="illustrations/empty-no-recordings.svg" alt="Cappy looking around">
    <h3>No guides yet</h3>
    <span class="ko">아직 가이드가 없어요</span>
    <p>Record your first workflow and it'll show up here. ✨</p>
    <button class="btn btn-primary" onclick="document.getElementById('btnNewRecording').click()">Start Recording →</button>
  </div>
</div>

<!-- Confirm delete -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete this guide?</h3>
    <p>This can't be undone. The guide and all its screenshots will be permanently removed.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
      <button class="btn" id="confirmDelete" style="background:#EF4444;color:white">Delete</button>
    </div>
  </div>
</div>

<script src="library.js"></script>
</body>
</html>
