<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Animations --- */
    @keyframes record-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.78); opacity: 0.55; }
    }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95%, 98% { transform: scaleY(0.1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes success-wiggle {
      0% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.08) rotate(-3deg); }
      70% { transform: scale(0.98) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* --- Cappy mood classes --- */
    .cappy-float {
      animation: float 3.6s ease-in-out infinite;
    }

    .cappy-wiggle {
      animation: success-wiggle 600ms cubic-bezier(0.34, 1.4, 0.64, 1) 1;
    }

    .cappy-blink .eye-l,
    .cappy-blink .eye-r {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center;
    }

    @media (prefers-reduced-motion: reduce) {
      .cappy-float, .cappy-wiggle,
      .cappy-blink .eye-l, .cappy-blink .eye-r,
      .recording-dot { animation: none !important; }
    }

    /* Header with cool-focus gradient */
    .header {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A78BFA 100%);
      color: white;
      padding: 16px 20px 14px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    /* Mini Cappy face icon in header */
    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .header-title-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header-subtitle {
      font-size: 11px;
      opacity: 0.75;
      letter-spacing: 0.04em;
      font-weight: 500;
    }

    .header p {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.01em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #E2E8F0;
      padding: 0 8px;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #94A3B8;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      border-radius: 0;
      width: auto;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }

    .tab:hover { color: #64748B; }

    .tab.active {
      color: #6366F1;
      border-bottom-color: #6366F1;
    }

    /* Content */
    .tab-content {
      display: none;
      padding: 20px 20px 16px;
    }

    .tab-content.active { display: block; }

    /* Stats card */
    .stats-card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
    }

    /* Cappy mood container */
    #cappyMood {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    #cappySvg {
      display: block;
    }

    .step-count {
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFD4A8 0%, #C8956D 40%, #8B5CF6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }

    .step-label {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94A3B8;
      padding: 6px 12px;
      background: #F1F5F9;
      border-radius: 9999px;
      margin: 0 auto 16px;
      width: fit-content;
    }

    .status.recording {
      color: #EF4444;
      background: #FEF2F2;
    }

    .status.autopilot {
      color: #7C3AED;
      background: #F5F3FF;
    }

    .status.done {
      color: #10B981;
      background: #ECFDF5;
    }

    .status-wrapper {
      display: flex;
      justify-content: center;
    }

    /* Buttons */
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn-record {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-record:hover {
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-stop {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-stop:hover {
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      transform: translateY(-1px);
    }

    .btn-view {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-view:hover {
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-new {
      background: white;
      color: #6366F1;
      border: 1.5px solid #E2E8F0;
      margin-top: 8px;
      box-shadow: none;
    }

    .btn-new:hover {
      background: #F8FAFC;
      border-color: #6366F1;
    }

    .btn-autopilot {
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .btn-autopilot:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
      transform: translateY(-1px);
    }

    /* Recording pulse */
    .recording-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #EF4444;
      border-radius: 50%;
      animation: record-pulse 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .hidden { display: none; }

    /* Autopilot */
    .autopilot-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 90px;
      margin-bottom: 12px;
      transition: border-color 0.15s ease;
      color: #0F172A;
      background: white;
      line-height: 1.5;
    }

    .autopilot-input:focus {
      outline: none;
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .autopilot-input::placeholder { color: #CBD5E1; }

    .autopilot-hint {
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .autopilot-log {
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 14px;
      background: white;
      border-radius: 10px;
      border: 1px solid #E2E8F0;
      padding: 8px 12px;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #F1F5F9;
      font-family: 'Inter', monospace;
      line-height: 1.4;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-ok { color: #10B981; }
    .log-fail { color: #EF4444; }
    .log-info { color: #6366F1; }

    /* Footer */
    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #CBD5E1;
      border-top: 1px solid #F1F5F9;
    }

    .footer a {
      color: #6366F1;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <div class="header-icon">
        <!-- Mini Cappy face inline SVG ~36px -->
        <svg viewBox="0 0 200 200" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="115" rx="92" ry="80" fill="#C8956D"/>
          <ellipse cx="42" cy="53" rx="15" ry="12" transform="rotate(-22 42 53)" fill="#A6754F"/>
          <ellipse cx="158" cy="53" rx="15" ry="12" transform="rotate(22 158 53)" fill="#A6754F"/>
          <ellipse cx="43" cy="55" rx="7" ry="5" transform="rotate(-22 43 55)" fill="#FFD4A8"/>
          <ellipse cx="157" cy="55" rx="7" ry="5" transform="rotate(22 157 55)" fill="#FFD4A8"/>
          <ellipse cx="100" cy="140" rx="48" ry="30" fill="#E8B98E"/>
          <circle cx="75" cy="92" r="10" fill="#0F172A"/>
          <circle cx="78" cy="88" r="3" fill="#FFFFFF"/>
          <circle cx="125" cy="92" r="10" fill="#0F172A"/>
          <circle cx="128" cy="88" r="3" fill="#FFFFFF"/>
          <ellipse cx="100" cy="130" rx="9" ry="5" fill="#0F172A"/>
          <path d="M 85 144 Q 100 156 115 144" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="header-title-group">
        <h1>Chingu</h1>
        <span class="header-subtitle">친구</span>
      </div>
    </div>
    <p>SOPs that actually work</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="record">Record</button>
    <button class="tab" data-tab="autopilot">Autopilot</button>
  </div>

  <!-- Record Tab -->
  <div class="tab-content active" id="tab-record">
    <div class="stats-card">
      <div id="cappyMood">
        <svg id="cappySvg" viewBox="0 0 200 200" width="90" height="90" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="step-count" id="stepCount">0</div>
      <div class="step-label">Steps Captured</div>
    </div>

    <div class="status-wrapper">
      <div class="status" id="status">Ready to record</div>
    </div>

    <div id="idleControls">
      <button class="btn-record" id="btnRecord">Start Recording</button>
    </div>

    <div id="recordingControls" class="hidden">
      <button class="btn-stop" id="btnStop">Stop Recording</button>
    </div>

    <div id="doneControls" class="hidden">
      <button class="btn-view" id="btnView">View Guide</button>
      <button class="btn-new" id="btnNew">New Recording</button>
    </div>
  </div>

  <!-- Autopilot Tab -->
  <div class="tab-content" id="tab-autopilot">
    <div class="autopilot-hint">
      Type step-by-step instructions, one per line.
      Chingu will execute them and capture screenshots automatically.
    </div>
    <textarea class="autopilot-input" id="autopilotInput" placeholder="click Settings
click Security
click Change Password
type MyNewPass123 in password field"></textarea>
    <button class="btn-autopilot" id="btnAutopilot">Run Autopilot</button>
    <button class="btn-stop hidden" id="btnAutopilotStop">Stop</button>
    <div class="autopilot-log hidden" id="autopilotLog"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/21428122/chingu" target="_blank">Chingu</a> — free, open source
  </div>

  <script>
    /* ── Cappy SVG generator ── */
    function cappySVG(state) {
      let eyes, mouth;
      switch (state) {
        case 'working':
          eyes = `<path d="M 65 90 Q 75 100 85 90" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
                  <path d="M 115 90 Q 125 100 135 90" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>`;
          mouth = `<line x1="92" y1="148" x2="108" y2="148" stroke="#0F172A" stroke-width="2.8" stroke-linecap="round"/>`;
          break;
        case 'happy':
          eyes = `<path d="M 62 95 Q 75 78 88 95" stroke="#0F172A" stroke-width="5" stroke-linecap="round" fill="none"/>
                  <path d="M 112 95 Q 125 78 138 95" stroke="#0F172A" stroke-width="5" stroke-linecap="round" fill="none"/>`;
          mouth = `<path d="M 80 144 Q 100 162 120 144" stroke="#0F172A" stroke-width="4" stroke-linecap="round" fill="none"/>`;
          break;
        case 'confused':
          eyes = `<circle cx="75" cy="92" r="9" fill="#0F172A"/>
                  <circle cx="78" cy="89" r="2.5" fill="#FFFFFF"/>
                  <circle cx="125" cy="92" r="11" fill="none" stroke="#0F172A" stroke-width="3"/>`;
          mouth = `<ellipse cx="100" cy="148" rx="5" ry="6" fill="none" stroke="#0F172A" stroke-width="3"/>`;
          break;
        case 'sleepy':
          eyes = `<path d="M 65 92 Q 75 100 85 92" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
                  <path d="M 115 92 Q 125 100 135 92" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>`;
          mouth = `<path d="M 92 146 Q 100 152 108 146" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" fill="none"/>`;
          break;
        default: /* idle / chill */
          eyes = `<g class="eye-l"><circle cx="75" cy="92" r="10" fill="#0F172A"/><circle cx="78" cy="88" r="3" fill="#FFFFFF"/></g>
                  <g class="eye-r"><circle cx="125" cy="92" r="10" fill="#0F172A"/><circle cx="128" cy="88" r="3" fill="#FFFFFF"/></g>`;
          mouth = `<path d="M 85 144 Q 100 156 115 144" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" fill="none"/>`;
      }
      return `
        <ellipse cx="100" cy="115" rx="92" ry="80" fill="#C8956D"/>
        <ellipse cx="42" cy="53" rx="15" ry="12" transform="rotate(-22 42 53)" fill="#A6754F"/>
        <ellipse cx="158" cy="53" rx="15" ry="12" transform="rotate(22 158 53)" fill="#A6754F"/>
        <ellipse cx="43" cy="55" rx="7" ry="5" transform="rotate(-22 43 55)" fill="#FFD4A8"/>
        <ellipse cx="157" cy="55" rx="7" ry="5" transform="rotate(22 157 55)" fill="#FFD4A8"/>
        <ellipse cx="32" cy="118" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
        <ellipse cx="168" cy="118" rx="14" ry="8" fill="#FF8FA3" opacity="0.42"/>
        <ellipse cx="100" cy="140" rx="48" ry="30" fill="#E8B98E"/>
        ${eyes}
        <ellipse cx="100" cy="130" rx="9" ry="5" fill="#0F172A"/>
        ${mouth}
      `;
    }

    /* ── setCappyState: update SVG + CSS animation classes ── */
    function setCappyState(state) {
      const svg = document.getElementById('cappySvg');
      const mood = document.getElementById('cappyMood');
      if (!svg || !mood) return;

      svg.innerHTML = cappySVG(state);

      // Remove all animation classes first
      mood.classList.remove('cappy-float', 'cappy-wiggle', 'cappy-blink');
      svg.classList.remove('cappy-float', 'cappy-wiggle', 'cappy-blink');

      // Apply animations based on state
      switch (state) {
        case 'idle':
        case 'default':
          svg.classList.add('cappy-float', 'cappy-blink');
          break;
        case 'working':
          svg.classList.add('cappy-blink');
          break;
        case 'happy':
          // Trigger wiggle (one-shot) — re-add after removing to restart animation
          void svg.offsetWidth; // force reflow
          svg.classList.add('cappy-wiggle');
          // After wiggle finishes, switch to float
          svg.addEventListener('animationend', function onEnd() {
            svg.removeEventListener('animationend', onEnd);
            svg.classList.remove('cappy-wiggle');
            svg.classList.add('cappy-float', 'cappy-blink');
          }, { once: true });
          break;
        case 'confused':
          // Just static, slight float
          svg.classList.add('cappy-float');
          break;
        case 'sleepy':
          // Very gentle float
          svg.classList.add('cappy-float');
          break;
        default:
          svg.classList.add('cappy-float', 'cappy-blink');
      }
    }

    // Expose globally so popup.js can optionally call it
    window.setCappyState = setCappyState;

    // Initialize with idle/default state
    setCappyState('idle');

    /* ── MutationObserver to sync Cappy with popup.js state changes ── */
    (function() {
      function deriveState() {
        const idle    = document.getElementById('idleControls');
        const rec     = document.getElementById('recordingControls');
        const done    = document.getElementById('doneControls');
        const status  = document.getElementById('status');

        if (!idle || !rec || !done) return;

        const isRecording = rec && !rec.classList.contains('hidden');
        const isDone      = done && !done.classList.contains('hidden');
        const isIdle      = idle && !idle.classList.contains('hidden');

        if (isRecording) {
          setCappyState('working');
        } else if (isDone) {
          setCappyState('happy');
        } else {
          // Check status text for extra cues
          const txt = status ? status.textContent.toLowerCase() : '';
          if (txt.includes('error') || txt.includes('fail')) {
            setCappyState('confused');
          } else {
            setCappyState('idle');
          }
        }
      }

      const targets = ['idleControls', 'recordingControls', 'doneControls', 'status'];
      targets.forEach(function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const observer = new MutationObserver(deriveState);
        observer.observe(el, { attributes: true, attributeFilter: ['class'], childList: false, subtree: false });
      });

      // Also observe status text changes
      const statusEl = document.getElementById('status');
      if (statusEl) {
        const textObs = new MutationObserver(deriveState);
        textObs.observe(statusEl, { childList: true, subtree: true, characterData: true });
      }
    })();
  </script>
  <script src="popup.js"></script>
</body>
</html>
