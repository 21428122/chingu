<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* Header with gradient */
    .header {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A78BFA 100%);
      color: white;
      padding: 20px 20px 16px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.01em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #E2E8F0;
      padding: 0 8px;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #94A3B8;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      border-radius: 0;
      width: auto;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }

    .tab:hover { color: #64748B; }

    .tab.active {
      color: #6366F1;
      border-bottom-color: #6366F1;
    }

    /* Content */
    .tab-content {
      display: none;
      padding: 24px 20px 20px;
    }

    .tab-content.active { display: block; }

    /* Stats card */
    .stats-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.06);
      margin-bottom: 20px;
    }

    .step-count {
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }

    .step-label {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94A3B8;
      padding: 6px 12px;
      background: #F1F5F9;
      border-radius: 9999px;
      margin: 0 auto 20px;
      width: fit-content;
    }

    .status.recording {
      color: #EF4444;
      background: #FEF2F2;
    }

    .status.autopilot {
      color: #7C3AED;
      background: #F5F3FF;
    }

    .status.done {
      color: #10B981;
      background: #ECFDF5;
    }

    .status-wrapper {
      display: flex;
      justify-content: center;
    }

    /* Buttons */
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn-record {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-record:hover {
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-stop {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-stop:hover {
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      transform: translateY(-1px);
    }

    .btn-view {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-view:hover {
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-new {
      background: white;
      color: #6366F1;
      border: 1.5px solid #E2E8F0;
      margin-top: 8px;
      box-shadow: none;
    }

    .btn-new:hover {
      background: #F8FAFC;
      border-color: #6366F1;
    }

    .btn-autopilot {
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .btn-autopilot:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
      transform: translateY(-1px);
    }

    /* Recording pulse */
    .recording-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #EF4444;
      border-radius: 50%;
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .hidden { display: none; }

    /* Autopilot */
    .autopilot-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 90px;
      margin-bottom: 12px;
      transition: border-color 0.15s ease;
      color: #0F172A;
      background: white;
      line-height: 1.5;
    }

    .autopilot-input:focus {
      outline: none;
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .autopilot-input::placeholder { color: #CBD5E1; }

    .autopilot-hint {
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .autopilot-log {
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 14px;
      background: white;
      border-radius: 10px;
      border: 1px solid #E2E8F0;
      padding: 8px 12px;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #F1F5F9;
      font-family: 'Inter', monospace;
      line-height: 1.4;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-ok { color: #10B981; }
    .log-fail { color: #EF4444; }
    .log-info { color: #6366F1; }

    /* Footer */
    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #CBD5E1;
      border-top: 1px solid #F1F5F9;
    }

    .footer a {
      color: #6366F1;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
        </svg>
      </div>
      <h1>Chingu</h1>
    </div>
    <p>SOPs that actually work</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="record">Record</button>
    <button class="tab" data-tab="autopilot">Autopilot</button>
  </div>

  <!-- Record Tab -->
  <div class="tab-content active" id="tab-record">
    <div class="stats-card">
      <div class="step-count" id="stepCount">0</div>
      <div class="step-label">Steps Captured</div>
    </div>

    <div class="status-wrapper">
      <div class="status" id="status">Ready to record</div>
    </div>

    <div id="idleControls">
      <button class="btn-record" id="btnRecord">Start Recording</button>
    </div>

    <div id="recordingControls" class="hidden">
      <button class="btn-stop" id="btnStop">Stop Recording</button>
    </div>

    <div id="doneControls" class="hidden">
      <button class="btn-view" id="btnView">View Guide</button>
      <button class="btn-new" id="btnNew">New Recording</button>
    </div>
  </div>

  <!-- Autopilot Tab -->
  <div class="tab-content" id="tab-autopilot">
    <div class="autopilot-hint">
      Type step-by-step instructions, one per line.
      Chingu will execute them and capture screenshots automatically.
    </div>
    <textarea class="autopilot-input" id="autopilotInput" placeholder="click Settings
click Security
click Change Password
type MyNewPass123 in password field"></textarea>
    <button class="btn-autopilot" id="btnAutopilot">Run Autopilot</button>
    <button class="btn-stop hidden" id="btnAutopilotStop">Stop</button>
    <div class="autopilot-log hidden" id="autopilotLog"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/21428122/chingu" target="_blank">Chingu</a> — free, open source
  </div>

  <script src="popup.js"></script>
</body>
</html>
