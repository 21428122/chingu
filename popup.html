<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }

    .header {
      background: #4F46E5;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .content {
      padding: 20px 16px;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .status.recording {
      color: #DC2626;
      font-weight: 600;
    }

    .step-count {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 4px;
    }

    .step-label {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-record {
      background: #4F46E5;
      color: white;
    }

    .btn-record:hover {
      background: #4338CA;
    }

    .btn-stop {
      background: #DC2626;
      color: white;
    }

    .btn-stop:hover {
      background: #B91C1C;
    }

    .btn-view {
      background: #059669;
      color: white;
      margin-top: 8px;
    }

    .btn-view:hover {
      background: #047857;
    }

    .btn-new {
      background: transparent;
      color: #4F46E5;
      border: 1px solid #4F46E5;
      margin-top: 8px;
    }

    .btn-new:hover {
      background: #EEF2FF;
    }

    .recording-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #DC2626;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chingu</h1>
    <p>SOPs that actually work</p>
  </div>

  <div class="content">
    <div class="step-count" id="stepCount">0</div>
    <div class="step-label">steps captured</div>

    <div class="status" id="status">Ready to record</div>

    <!-- Idle state -->
    <div id="idleControls">
      <button class="btn-record" id="btnRecord">Start Recording</button>
    </div>

    <!-- Recording state -->
    <div id="recordingControls" class="hidden">
      <button class="btn-stop" id="btnStop">
        Stop Recording
      </button>
    </div>

    <!-- Done state -->
    <div id="doneControls" class="hidden">
      <button class="btn-view" id="btnView">View Guide</button>
      <button class="btn-new" id="btnNew">New Recording</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
