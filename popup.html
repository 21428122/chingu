<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }

    .header {
      background: #4F46E5;
      color: white;
      padding: 14px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e5e5;
      background: white;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none;
      border-radius: 0;
      width: auto;
    }

    .tab:hover { color: #666; }

    .tab.active {
      color: #4F46E5;
      border-bottom-color: #4F46E5;
    }

    .tab-content {
      display: none;
      padding: 20px 16px;
    }

    .tab-content.active {
      display: block;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .status.recording {
      color: #DC2626;
      font-weight: 600;
    }

    .status.autopilot {
      color: #4F46E5;
      font-weight: 600;
    }

    .step-count {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 4px;
    }

    .step-label {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-record { background: #4F46E5; color: white; }
    .btn-record:hover { background: #4338CA; }

    .btn-stop { background: #DC2626; color: white; }
    .btn-stop:hover { background: #B91C1C; }

    .btn-view { background: #059669; color: white; margin-top: 8px; }
    .btn-view:hover { background: #047857; }

    .btn-new {
      background: transparent;
      color: #4F46E5;
      border: 1px solid #4F46E5;
      margin-top: 8px;
    }
    .btn-new:hover { background: #EEF2FF; }

    .btn-autopilot { background: #7C3AED; color: white; }
    .btn-autopilot:hover { background: #6D28D9; }

    .recording-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #DC2626;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hidden { display: none; }

    /* Autopilot styles */
    .autopilot-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    .autopilot-input:focus {
      outline: none;
      border-color: #7C3AED;
    }

    .autopilot-input::placeholder {
      color: #bbb;
    }

    .autopilot-log {
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .log-ok { color: #059669; }
    .log-fail { color: #DC2626; }
    .log-info { color: #4F46E5; }

    .autopilot-hint {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chingu</h1>
    <p>SOPs that actually work</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="record">Record</button>
    <button class="tab" data-tab="autopilot">Autopilot</button>
  </div>

  <!-- Record Tab -->
  <div class="tab-content active" id="tab-record">
    <div class="step-count" id="stepCount">0</div>
    <div class="step-label">steps captured</div>
    <div class="status" id="status">Ready to record</div>

    <div id="idleControls">
      <button class="btn-record" id="btnRecord">Start Recording</button>
    </div>

    <div id="recordingControls" class="hidden">
      <button class="btn-stop" id="btnStop">Stop Recording</button>
    </div>

    <div id="doneControls" class="hidden">
      <button class="btn-view" id="btnView">View Guide</button>
      <button class="btn-new" id="btnNew">New Recording</button>
    </div>
  </div>

  <!-- Autopilot Tab -->
  <div class="tab-content" id="tab-autopilot">
    <div class="autopilot-hint">
      Type step-by-step instructions, one per line.
      Chingu will execute them and capture screenshots.
    </div>
    <textarea class="autopilot-input" id="autopilotInput" placeholder="click Settings
click Security
click Change Password
type MyNewPass123 in password field"></textarea>
    <button class="btn-autopilot" id="btnAutopilot">Run Autopilot</button>
    <button class="btn-stop hidden" id="btnAutopilotStop">Stop</button>
    <div class="autopilot-log hidden" id="autopilotLog"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
